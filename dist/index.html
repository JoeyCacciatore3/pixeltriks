<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Blindfire</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }
    #game { width: 100%; height: 100%; }
    canvas { display: block; touch-action: none; }

    /* ─── HUD ─── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 4px 12px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #fff;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      padding-top: max(8px, env(safe-area-inset-top));
    }
    .hud-turn { font-size: 15px; font-weight: 700; }
    .hud-timer {
      font-size: 22px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 40px; text-align: center;
    }
    .hud-teams { display: flex; gap: 16px; font-weight: 600; font-size: 12px; }
    .hud-weapon {
      background: rgba(0,0,0,0.6);
      padding: 3px 10px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 12px;
    }
    .hud-controls {
      position: fixed;
      bottom: 12px; left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      opacity: 0.4;
      pointer-events: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    @media (min-width: 700px) {
      #hud { padding: 12px 20px; font-size: 14px; }
      .hud-turn { font-size: 18px; }
      .hud-timer { font-size: 28px; }
      .hud-teams { gap: 24px; font-size: 14px; }
      .hud-weapon { font-size: 14px; padding: 4px 12px; }
    }

    /* ─── GAME OVER ─── */
    .game-over {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      z-index: 20;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .game-over h1 { font-size: 48px; font-weight: 900; }
    .game-over p { font-size: 18px; color: #aaa; margin-top: 12px; }
    .game-over .restart-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, #2244aa, #3366dd);
      border: 1px solid #4488ff;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 14px 48px;
      border-radius: 8px;
      cursor: pointer;
      pointer-events: auto;
    }
    @media (min-width: 700px) {
      .game-over h1 { font-size: 64px; }
      .game-over p { font-size: 20px; }
    }

    /* ─── MENU ─── */
    #menu-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a2a 100%);
      z-index: 30;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }
    .menu-container { text-align: center; width: 100%; max-width: 400px; }
    .menu-title {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(180deg, #fff 0%, #88aaff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      margin-bottom: 6px;
    }
    .menu-subtitle {
      font-size: 14px;
      color: #8899bb;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .menu-buttons { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .menu-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 16px 40px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 220px;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-btn:hover, .menu-btn:active {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }
    .menu-btn:active { transform: scale(0.97); }
    .menu-btn.primary {
      background: linear-gradient(135deg, #2244aa, #3366dd);
      border-color: #4488ff;
    }
    .menu-btn.primary:hover, .menu-btn.primary:active {
      background: linear-gradient(135deg, #3355bb, #4477ee);
    }
    .menu-btn.small { padding: 14px 20px; min-width: auto; }
    .join-row { display: flex; gap: 8px; align-items: center; }
    .menu-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 6px;
      text-align: center;
      text-transform: uppercase;
      padding: 14px 16px;
      border-radius: 8px;
      width: 120px;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-input:focus { border-color: #4488ff; }
    .menu-input::placeholder { color: #556; letter-spacing: 4px; }
    .lobby-code {
      font-size: 40px;
      font-weight: 900;
      letter-spacing: 10px;
      color: #4488ff;
      margin: 16px 0;
    }
    .menu-footer {
      margin-top: 32px;
      font-size: 11px;
      color: #445;
      letter-spacing: 1px;
    }

    @media (min-width: 700px) {
      .menu-title { font-size: 80px; letter-spacing: 8px; }
      .menu-subtitle { font-size: 18px; letter-spacing: 6px; margin-bottom: 40px; }
      .lobby-code { font-size: 48px; letter-spacing: 12px; }
    }

    /* ─── TOUCH CONTROLS ─── */
    #touch-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 8px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 15;
      pointer-events: none;
    }

    .tc-left, .tc-right {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      pointer-events: auto;
    }
    .tc-right { gap: 8px; }

    .tc-move-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .tc-aim-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tc-util-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tc-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.12);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      border-radius: 10px;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.1s, transform 0.1s;
    }
    .tc-btn:active, .tc-btn.tc-active {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0.93);
    }

    .tc-move {
      width: 56px; height: 56px;
    }
    .tc-jump {
      width: 56px; height: 56px;
      font-size: 10px;
      background: rgba(100, 200, 255, 0.15);
      border-color: rgba(100, 200, 255, 0.35);
    }
    .tc-aim {
      width: 48px; height: 44px;
    }
    .tc-fire {
      width: 80px; height: 80px;
      border-radius: 50%;
      font-size: 14px;
      letter-spacing: 2px;
      background: rgba(255, 60, 60, 0.25);
      border-color: rgba(255, 80, 80, 0.5);
    }
    .tc-fire:active, .tc-fire.tc-active {
      background: rgba(255, 60, 60, 0.55);
    }
    .tc-weapon {
      width: 48px; height: 40px;
      font-size: 10px;
      background: rgba(255, 200, 50, 0.15);
      border-color: rgba(255, 200, 50, 0.35);
    }
    .tc-end {
      width: 48px; height: 40px;
      font-size: 10px;
      background: rgba(150, 150, 150, 0.15);
      border-color: rgba(150, 150, 150, 0.35);
    }

    /* hide keyboard hint on touch/small screens */
    @media (max-width: 899px) {
      .hud-controls { display: none; }
    }
    body.has-touch .hud-controls { display: none; }

    /* landscape phones: tighter spacing */
    @media (max-height: 500px) {
      #touch-controls { padding-bottom: 4px; }
      .tc-move { width: 48px; height: 48px; }
      .tc-jump { width: 48px; height: 48px; }
      .tc-fire { width: 64px; height: 64px; font-size: 12px; }
      .tc-aim { width: 40px; height: 36px; }
      .tc-weapon, .tc-end { width: 40px; height: 34px; font-size: 9px; }
      #hud { padding: 4px 8px; }
      .hud-timer { font-size: 18px; }
      .hud-turn { font-size: 13px; }
    }
  </style>

  <link rel="modulepreload" crossorigin href="/assets/three-Dl5DamlL.js">
</head>

  <div id="game"></div>
  <div id="hud"></div>

</html>
