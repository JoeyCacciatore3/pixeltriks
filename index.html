<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Pixeltriks: Humans vs AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }
    #game { width: 100%; height: 100%; }
    canvas { display: block; touch-action: none; }

    /* ─── HUD ─── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 4px 12px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #fff;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      padding-top: max(8px, env(safe-area-inset-top));
    }
    .hud-turn { font-size: 15px; font-weight: 700; }
    .hud-timer {
      font-size: 22px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 40px; text-align: center;
    }
    .hud-teams { display: flex; gap: 16px; font-weight: 600; font-size: 12px; }
    .hud-weapon {
      background: rgba(0,0,0,0.6);
      padding: 3px 10px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 12px;
    }
    .hud-controls {
      position: fixed;
      bottom: 12px; left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      opacity: 0.4;
      pointer-events: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    @media (min-width: 700px) {
      #hud { padding: 12px 20px; font-size: 14px; }
      .hud-turn { font-size: 18px; }
      .hud-timer { font-size: 28px; }
      .hud-teams { gap: 24px; font-size: 14px; }
      .hud-weapon { font-size: 14px; padding: 4px 12px; }
    }

    /* ─── GAME OVER ─── */
    .game-over {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      z-index: 20;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .game-over h1 { font-size: 48px; font-weight: 900; }
    .game-over p { font-size: 18px; color: #aaa; margin-top: 12px; }
    .game-over .restart-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, #2244aa, #3366dd);
      border: 1px solid #4488ff;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 14px 48px;
      border-radius: 8px;
      cursor: pointer;
      pointer-events: auto;
    }
    @media (min-width: 700px) {
      .game-over h1 { font-size: 64px; }
      .game-over p { font-size: 20px; }
    }

    /* ─── MENU ─── */
    #menu-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a2a 100%);
      z-index: 30;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }
    .menu-container { text-align: center; width: 100%; max-width: 400px; }
    .menu-title {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(180deg, #fff 0%, #88aaff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      margin-bottom: 6px;
    }
    .menu-subtitle {
      font-size: 14px;
      color: #8899bb;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .menu-buttons { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .menu-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 16px 40px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 220px;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-btn:hover, .menu-btn:active {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }
    .menu-btn:active { transform: scale(0.97); }
    .menu-btn.primary {
      background: linear-gradient(135deg, #2244aa, #3366dd);
      border-color: #4488ff;
    }
    .menu-btn.primary:hover, .menu-btn.primary:active {
      background: linear-gradient(135deg, #3355bb, #4477ee);
    }
    .menu-btn.small { padding: 14px 20px; min-width: auto; }
    .join-row { display: flex; gap: 8px; align-items: center; }
    .menu-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 6px;
      text-align: center;
      text-transform: uppercase;
      padding: 14px 16px;
      border-radius: 8px;
      width: 120px;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-input:focus { border-color: #4488ff; }
    .menu-input::placeholder { color: #556; letter-spacing: 4px; }
    .lobby-code {
      font-size: 40px;
      font-weight: 900;
      letter-spacing: 10px;
      color: #4488ff;
      margin: 16px 0;
    }
    .menu-footer {
      margin-top: 32px;
      font-size: 11px;
      color: #445;
      letter-spacing: 1px;
    }

    @media (min-width: 700px) {
      .menu-title { font-size: 80px; letter-spacing: 8px; }
      .menu-subtitle { font-size: 18px; letter-spacing: 6px; margin-bottom: 40px; }
      .lobby-code { font-size: 48px; letter-spacing: 12px; }
    }

    /* ─── TOUCH CONTROLS ─── */
    #touch-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 10px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 15;
      pointer-events: none;
    }

    .tc-left, .tc-right {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      pointer-events: auto;
    }
    .tc-right { flex-direction: row; align-items: flex-end; gap: 8px; }

    /* D-pad 3×3 grid */
    .tc-dpad, .tc-aim-pad {
      display: grid;
      grid-template-columns: 50px 38px 50px;
      grid-template-rows: 50px 38px 50px;
      gap: 3px;
    }
    .tc-dpad-cell { /* empty corner cell */ }
    .tc-dpad-center {
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
    }
    .tc-aim-center {
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 7px;
      font-weight: 700;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.2);
    }

    .tc-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: rgba(255, 255, 255, 0.10);
      border: 1.5px solid rgba(255, 255, 255, 0.20);
      border-radius: 10px;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.5px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      transition: background 0.08s, transform 0.08s, border-color 0.08s;
    }
    .tc-btn:active, .tc-btn.tc-active {
      background: rgba(255, 255, 255, 0.28);
      border-color: rgba(255,255,255,0.5);
      transform: scale(0.91);
    }

    .tc-dpad-btn {
      width: 50px; height: 50px;
      background: rgba(80, 160, 255, 0.11);
      border-color: rgba(80, 160, 255, 0.28);
    }
    .tc-dpad-btn:active, .tc-dpad-btn.tc-active {
      background: rgba(80, 160, 255, 0.35);
      border-color: rgba(80, 160, 255, 0.6);
    }

    .tc-jump {
      width: 148px; height: 44px;
      font-size: 11px;
      gap: 5px;
      flex-direction: row;
      background: rgba(100, 220, 255, 0.11);
      border-color: rgba(100, 220, 255, 0.28);
    }
    .tc-jump:active, .tc-jump.tc-active {
      background: rgba(100, 220, 255, 0.35);
      border-color: rgba(100, 220, 255, 0.6);
    }

    .tc-aim-btn {
      width: 50px; height: 50px;
      background: rgba(255, 220, 80, 0.09);
      border-color: rgba(255, 220, 80, 0.22);
    }
    .tc-aim-btn:active, .tc-aim-btn.tc-active {
      background: rgba(255, 220, 80, 0.35);
      border-color: rgba(255, 220, 80, 0.6);
    }

    .tc-fire-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .tc-fire {
      width: 82px; height: 82px;
      border-radius: 50%;
      font-size: 13px;
      letter-spacing: 2px;
      background: rgba(255, 55, 55, 0.20);
      border: 2px solid rgba(255, 70, 70, 0.48);
    }
    .tc-fire:active, .tc-fire.tc-active {
      background: rgba(255, 55, 55, 0.55);
      border-color: rgba(255, 100, 100, 0.8);
      transform: scale(0.93);
    }
    .tc-util-row {
      display: flex;
      gap: 6px;
    }
    .tc-weapon {
      width: 38px; height: 38px;
      font-size: 9px;
      background: rgba(255, 200, 50, 0.11);
      border-color: rgba(255, 200, 50, 0.28);
    }
    .tc-end {
      width: 38px; height: 38px;
      font-size: 9px;
      background: rgba(160, 160, 160, 0.11);
      border-color: rgba(160, 160, 160, 0.28);
    }

    /* ─── POWER BAR ─── */
    .hud-power-wrap {
      position: fixed;
      bottom: 68px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 14px;
      background: rgba(0,0,0,0.55);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      overflow: hidden;
      pointer-events: none;
      z-index: 12;
    }
    .hud-power-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.04s linear, background 0.1s linear;
    }
    @media (max-width: 899px) {
      .hud-power-wrap { bottom: 160px; }
    }
    @media (max-height: 500px) {
      .hud-power-wrap { bottom: 120px; }
    }

    /* ─── TURN BANNER ─── */
    .turn-banner {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9), 0 0 30px currentColor;
      pointer-events: none;
      z-index: 22;
      opacity: 0;
    }
    @keyframes turn-banner-in {
      0%   { opacity: 0; transform: translateX(-50%) scale(0.7); }
      20%  { opacity: 1; transform: translateX(-50%) scale(1.08); }
      35%  { opacity: 1; transform: translateX(-50%) scale(1.0); }
      75%  { opacity: 1; transform: translateX(-50%) scale(1.0); }
      100% { opacity: 0; transform: translateX(-50%) scale(0.95); }
    }
    .turn-banner-anim {
      animation: turn-banner-in 1.8s ease-out forwards;
    }

    /* ─── DAMAGE FLOATS ─── */
    .damage-float {
      position: fixed;
      pointer-events: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 900;
      font-size: 20px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.6);
      z-index: 25;
      transform: translateX(-50%);
    }

    /* hide keyboard hint on touch/small screens */
    @media (max-width: 899px) {
      .hud-controls { display: none; }
    }
    body.has-touch .hud-controls { display: none; }

    /* landscape phones: compact layout */
    @media (max-height: 500px) {
      #touch-controls { padding-bottom: 4px; }
      .tc-dpad, .tc-aim-pad {
        grid-template-columns: 44px 32px 44px;
        grid-template-rows: 44px 32px 44px;
        gap: 2px;
      }
      .tc-dpad-btn, .tc-aim-btn { width: 44px; height: 44px; }
      .tc-jump { width: 120px; height: 38px; }
      .tc-fire { width: 70px; height: 70px; }
      .tc-weapon, .tc-end { width: 32px; height: 32px; font-size: 8px; }
      #hud { padding: 4px 8px; }
      .hud-timer { font-size: 18px; }
      .hud-turn { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="hud"></div>
  <script type="module" src="/src/client/main.ts"></script>
  <script async src="https://vibej.am/2026/widget.js"></script>
</body>
</html>
